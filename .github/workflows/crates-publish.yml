name: "Publish to crates.io"

on:
  push:
    tags:
      - "cpop-jitter-v*"
      - "cpop-protocol-v*"

jobs:
  publish:
    name: "Publish"
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout"
      uses: actions/checkout@v6

    - name: "Install Rust"
      uses: dtolnay/rust-toolchain@stable

    - name: "Test"
      run: cargo test --workspace

    - name: "Publish cpop-jitter"
      if: startsWith(github.ref, 'refs/tags/cpop-jitter-v')
      run: cargo publish -p cpop-jitter
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    - name: "Publish cpop-protocol"
      if: startsWith(github.ref, 'refs/tags/cpop-protocol-v')
      run: cargo publish -p cpop-protocol
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
