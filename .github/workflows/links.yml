name: "Link Check"

on:
  push:
    paths:
    - "**.md"
    - "docs/**"
  pull_request:
    paths:
    - "**.md"
    - "docs/**"
  schedule:
  - cron: "0 3 * * 1"  # Weekly Monday 3am UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  links:
    name: "Check Links"
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout"
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: "Check Links"
      uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
      with:
        args: >-
          --no-progress
          --exclude-loopback
          --exclude 'mailto:'
          --exclude 'example.com'
          --exclude 'lists.lfdecentralizedtrust.org'
          --exclude 'c2pa-org/specs-core/pull'
          --exclude 'lf-decentralized-trust.github.io/governance'
          --exclude 'docs.github.com'
          --exclude 'c2pa.org'
          --exclude 'doi.org'
          --exclude 'writerslogic'
          --exclude 'cawg.io'
          --timeout 30
          --max-retries 3
          --exclude-path 'draft-condrey-cpop-protocol.md'
          --exclude-path 'draft-condrey-cpop-appraisal.md'
          '*.md'
          'docs/**/*.md'
        fail: true
