name: Bug Report
description: Report a bug or unexpected behavior in the specification or tooling.
title: "bug: "
labels: [bug]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Please fill out the details below to help us understand and address the issue.

  - type: input
    id: summary
    attributes:
      label: Short Summary
      description: A concise summary of the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue.
      placeholder: |
        1. Run `make` with ...
        2. Open the generated HTML ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what actually happened.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the project is affected?
      options:
        - Protocol draft (draft-condrey-rats-pop-protocol)
        - Appraisal draft (draft-condrey-rats-pop-appraisal)
        - CDDL schema
        - Build tooling / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment details.
      placeholder: |
        - OS: macOS 15.3
        - xml2rfc: 3.24.0
        - kramdown-rfc: 1.7.22

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add logs, screenshots, or other relevant information.
